name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip reviews triggered by Claude's own commits to prevent loops
    if: |
      github.event.pull_request.user.login != 'claude[bot]' &&
      github.event.sender.login != 'claude[bot]' &&
      !contains(github.event.pull_request.title, '[skip-review]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: ""
          prompt: |
            You are reviewing a pull request for a Kotlin Multiplatform project.

            The base branch has been fetched. Use this to get the diff:
              git diff origin/${{ github.event.pull_request.base.ref }}...HEAD

            Review the PR diff. Focus on:
            - Scope leaks — changes that don't belong in this PR
            - Architecture consistency — single source of truth, UDF, layer boundaries
            - Business logic placement — must not live in composables or Android components
            - State and model boundaries — explicit UI state, separate one-time events
            - KMP source-set correctness — commonMain valid for all targets
            - Compose/UI performance — unnecessary recomposition, missing keys
            - Coroutine/cancellation/concurrency issues
            - Regression risks — broken edge cases, missing error handling
            - Missing tests for new business rules

            Post findings as specific review comments with severity (high/medium/low).

            End with a summary comment including:
            1. Overall assessment
            2. High-severity issues
            3. Medium-severity issues
            4. What looks good

            Do NOT apply fixes. Review only.
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          additional_permissions: "Bash(*),Read(*),Write(*),Edit(*),Glob(*),Grep(*)"
          show_full_output: true
